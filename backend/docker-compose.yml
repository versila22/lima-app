services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lima
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: lima_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lima -d lima_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://lima:${POSTGRES_PASSWORD:-changeme}@db:5432/lima_db
      JWT_SECRET: ${JWT_SECRET:-$(openssl rand -hex 32)}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: "*"
      DEBUG: "false"
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
