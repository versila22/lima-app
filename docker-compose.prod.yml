services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        # Vite bakes these into the built bundle.
        # Set VITE_SENTRY_DSN in a .env file next to this compose, or via shell env.
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: lima-frontend
    restart: unless-stopped
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lima-front.rule=Host(`limaimpro.duckdns.org`)"
      - "traefik.http.routers.lima-front.entrypoints=websecure"
      - "traefik.http.routers.lima-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.lima-front.loadbalancer.server.port=80"

networks:
  traefik_default:
    external: true
