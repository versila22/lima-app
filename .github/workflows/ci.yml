name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff, non-blocking warnings)
        run: ruff check app tests --output-format=github
        continue-on-error: true

      - name: Tests (pytest)
        env:
          JWT_SECRET: ci-test-secret
          REFRESH_JWT_SECRET: ci-test-refresh
          DEBUG: "true"
          APP_ENV: development
        shell: bash
        run: |
          set +e
          pytest -v --tb=long --maxfail=5 2>&1 | tee /tmp/pytest.log
          EXIT=${PIPESTATUS[0]}
          {
            echo '## Pytest output'
            echo '```'
            tail -400 /tmp/pytest.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT

  frontend:
    name: Frontend (vitest + eslint + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint, non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Tests (vitest)
        run: npm test

      - name: Security audit (high+critical, non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true
