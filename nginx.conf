server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
